<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Onda Patch</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #15171b;
        --panel: #1f2329;
        --panel-strong: #282d35;
        --text: #f3f5f7;
        --muted: #9ba6b2;
        --accent: #7fd1b9;
        --accent-strong: #57b89b;
        --danger: #e07a7a;
        --border: #353c46;
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        padding: 18px;
        background: #1b1d21;
        color: var(--text);
        font: 13px/1.45 ui-sans-serif, system-ui, sans-serif;
      }

      .shell {
        display: grid;
        gap: 16px;
      }

      .header, .buffers, .events, .params, .scope-section {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 14px;
      }

      .title {
        font-size: 16px;
        font-weight: 700;
      }

      .meta {
        margin-top: 6px;
        color: var(--muted);
        word-break: break-word;
      }

      .status {
        margin-top: 6px;
        color: var(--accent);
      }

      .error {
        margin-top: 10px;
        padding: 10px 12px;
        border-radius: 10px;
        border: 1px solid rgba(255, 107, 107, 0.55);
        background: #080909;
        color: var(--danger);
        font: 12px/1.45 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        white-space: pre-wrap;
        word-break: break-word;
        display: none;
      }

      .actions {
        margin-top: 12px;
        display: flex;
        gap: 10px;
      }

      .io-settings {
        margin-top: 12px;
        display: none;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 10px;
      }

      button {
        border: 0;
        border-radius: 999px;
        padding: 10px 16px;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      button.primary {
        background: var(--accent);
        color: #0b1713;
      }

      button.primary:hover {
        background: var(--accent-strong);
      }

      button.secondary {
        background: var(--panel-strong);
        color: var(--text);
      }

      button.event-trigger {
        background: transparent;
        color: var(--accent);
        border: 1px solid rgba(127, 209, 185, 0.8);
        box-shadow: inset 0 0 0 1px rgba(127, 209, 185, 0.12);
      }

      button.event-trigger:hover:not(:disabled) {
        background: rgba(127, 209, 185, 0.08);
        border-color: var(--accent);
      }

      button:disabled {
        cursor: default;
        opacity: 0.5;
      }

      .params-header {
        display: flex;
        justify-content: space-between;
        align-items: baseline;
        gap: 12px;
        margin-bottom: 12px;
      }

      .buffers-list {
        display: grid;
        gap: 12px;
      }

      .buffer-card {
        background: var(--panel-strong);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 12px;
      }

      .buffer-path {
        margin-top: 8px;
        color: var(--text);
        word-break: break-word;
      }

      .buffer-actions {
        display: flex;
        gap: 10px;
        margin-top: 10px;
      }

      .event-actions {
        display: flex;
        justify-content: flex-end;
        margin-top: 12px;
      }

      .params-title {
        font-size: 14px;
        font-weight: 700;
      }

      .params-subtitle {
        color: var(--muted);
      }

      .param-list {
        display: grid;
        gap: 12px;
      }

      .param {
        background: var(--panel-strong);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 12px;
      }

      .param-head {
        display: flex;
        justify-content: space-between;
        gap: 12px;
      }

      .param-name {
        font-weight: 700;
      }

      .param-type {
        color: var(--muted);
      }

      .param-setting {
        display: grid;
        gap: 6px;
      }

      .param-setting-label {
        color: var(--muted);
        font-size: 11px;
        letter-spacing: 0.02em;
        text-transform: uppercase;
      }

      .param-controls {
        display: grid;
        gap: 10px;
        margin-top: 10px;
      }

      .param-range {
        width: 100%;
      }

      .param-slider {
        position: relative;
        width: 100%;
        height: 22px;
        border: 1px solid var(--border);
        border-radius: 999px;
        background: #111418;
        cursor: pointer;
        touch-action: none;
      }

      .param-slider:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }

      .param-slider-track {
        position: absolute;
        left: 10px;
        right: 10px;
        top: 50%;
        height: 4px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.08);
        transform: translateY(-50%);
      }

      .param-slider-fill {
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 0%;
        border-radius: 999px;
        background: linear-gradient(90deg, var(--accent), var(--accent-strong));
      }

      .param-slider-thumb {
        position: absolute;
        top: 50%;
        width: 14px;
        height: 14px;
        border-radius: 999px;
        background: var(--text);
        box-shadow: 0 0 0 2px rgba(0, 0, 0, 0.35);
        transform: translate(-50%, -50%);
      }

      .param-number {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: #111418;
        color: var(--text);
        padding: 8px 10px;
        font: inherit;
      }

      .param-select {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: #111418;
        color: var(--text);
        padding: 8px 10px;
        font: inherit;
      }

      .param-toggle {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: var(--text);
      }

      .empty {
        color: var(--muted);
      }

      .scope-section {
        display: none;
      }
      .scope-canvas {
        width: 100%;
        height: 140px;
        border-radius: 6px;
        background: #0a0a0a;
        display: block;
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <section class="header">
        <div class="title">Onda Patch</div>
        <div class="meta" id="path"></div>
        <div class="status" id="status"></div>
        <div class="actions">
          <button class="primary" id="start">Start</button>
          <button class="secondary" id="stop">Stop</button>
          <button class="secondary" id="reset">Reset</button>
          <button class="secondary" id="refresh-devices">Refresh Devices</button>
        </div>
        <div class="error" id="error"></div>
        <div class="io-settings" id="io-settings">
          <div class="param-setting">
            <div class="param-setting-label">Input Device</div>
            <select class="param-select" id="input-device"></select>
          </div>
          <div class="param-setting">
            <div class="param-setting-label">Output Device</div>
            <select class="param-select" id="output-device"></select>
          </div>
        </div>
      </section>
      <section class="scope-section" id="scope-section">
        <div class="params-header">
          <div class="params-title">Scope</div>
        </div>
        <canvas class="scope-canvas" id="scope-canvas"></canvas>
      </section>
      <section class="buffers" id="buffers-section">
        <div class="params-header">
          <div class="params-title">Buffers</div>
          <div class="params-subtitle" id="buffers-summary"></div>
        </div>
        <div class="buffers-list" id="buffers"></div>
      </section>
      <section class="events" id="events-section">
        <div class="params-header">
          <div class="params-title">Events</div>
          <div class="params-subtitle" id="events-summary"></div>
        </div>
        <div class="param-list" id="events"></div>
      </section>
      <section class="params" id="params-section">
        <div class="params-header">
          <div class="params-title">Params</div>
          <div class="params-subtitle" id="params-summary"></div>
        </div>
        <div class="param-list" id="params"></div>
      </section>
    </div>
    <script>
      // ---------------------------------------------------------------------------
      // Host bridge abstraction
      // ---------------------------------------------------------------------------
      // The host environment injects `window.__hostBridge` before this script runs.
      //
      // VS Code host sets:
      //   window.__hostBridge = { mode: "vscode" }
      //   (uses acquireVsCodeApi().postMessage / window message events)
      //
      // wry (native) host sets:
      //   window.__hostBridge = { mode: "wry" }
      //   (uses window.ipc.postMessage / window._onHostMessage callback)
      //
      // If no bridge is injected we auto-detect VS Code by trying acquireVsCodeApi.
      // ---------------------------------------------------------------------------

      const hostBridge = (function () {
        const cfg = window.__hostBridge || {};
        const mode = cfg.mode || "auto";

        // --- VS Code path ---
        if (mode === "vscode" || (mode === "auto" && typeof acquireVsCodeApi === "function")) {
          const vscode = acquireVsCodeApi();
          return {
            postMessage(msg) { vscode.postMessage(msg); },
            onMessage(callback) {
              window.addEventListener("message", (event) => {
                if (event.data) callback(event.data);
              });
            },
          };
        }

        // --- wry (native window) path ---
        return {
          postMessage(msg) {
            if (window.ipc && window.ipc.postMessage) {
              window.ipc.postMessage(JSON.stringify(msg));
            }
          },
          onMessage(callback) {
            window._onHostMessage = callback;
          },
        };
      })();

      // ---------------------------------------------------------------------------
      // State and DOM refs
      // ---------------------------------------------------------------------------

      const SCOPE_COLORS = ["#22c55e", "#3b82f6", "#f59e0b", "#ef4444", "#a855f7", "#ec4899", "#14b8a6", "#f97316"];
      const state = {
        running: false,
        connected: false,
        path: "",
        status: "Stopped",
        error: "",
        buffers: [],
        events: [],
        params: [],
        inputDevices: [],
        outputDevices: [],
        currentInputDevice: null,
        currentOutputDevice: null,
      };

      const startButton = document.getElementById("start");
      const stopButton = document.getElementById("stop");
      const resetButton = document.getElementById("reset");
      const refreshDevicesButton = document.getElementById("refresh-devices");
      const pathNode = document.getElementById("path");
      const statusNode = document.getElementById("status");
      const errorNode = document.getElementById("error");
      const ioSettingsNode = document.getElementById("io-settings");
      const inputDeviceNode = document.getElementById("input-device");
      const outputDeviceNode = document.getElementById("output-device");
      const buffersSection = document.getElementById("buffers-section");
      const buffersSummaryNode = document.getElementById("buffers-summary");
      const buffersNode = document.getElementById("buffers");
      const eventsSection = document.getElementById("events-section");
      const eventsSummaryNode = document.getElementById("events-summary");
      const eventsNode = document.getElementById("events");
      const paramsSection = document.getElementById("params-section");
      const paramsSummaryNode = document.getElementById("params-summary");
      const paramsNode = document.getElementById("params");
      const scopeSection = document.getElementById("scope-section");
      const scopeCanvas = document.getElementById("scope-canvas");
      const scopeCtx = scopeCanvas.getContext("2d");
      const pendingParamMessages = new Map();
      let pendingParamFrame = 0;
      let pendingScopeFrame = 0;
      let latestScopeData = { channels: 0, samples: [] };

      // ---------------------------------------------------------------------------
      // Host communication
      // ---------------------------------------------------------------------------

      hostBridge.postMessage({ type: "webviewReady" });
      window.addEventListener("load", () => {
        hostBridge.postMessage({ type: "webviewReady" });
      });

      startButton.addEventListener("click", () => {
        hostBridge.postMessage({ type: "start", path: state.path || undefined });
      });
      stopButton.addEventListener("click", () => {
        hostBridge.postMessage({ type: "stop" });
      });
      resetButton.addEventListener("click", () => {
        hostBridge.postMessage({ type: "reset" });
      });
      refreshDevicesButton.addEventListener("click", () => {
        hostBridge.postMessage({ type: "refreshDevices" });
      });
      inputDeviceNode.addEventListener("change", () => {
        hostBridge.postMessage({ type: "setInputDevice", name: inputDeviceNode.value || null });
      });
      outputDeviceNode.addEventListener("change", () => {
        hostBridge.postMessage({ type: "setOutputDevice", name: outputDeviceNode.value || null });
      });

      // ---------------------------------------------------------------------------
      // Scope rendering
      // ---------------------------------------------------------------------------

      function drawScope(channels, samples) {
        const dpr = window.devicePixelRatio || 1;
        const rect = scopeCanvas.getBoundingClientRect();
        const w = Math.round(rect.width * dpr);
        const h = Math.round(rect.height * dpr);
        if (scopeCanvas.width !== w || scopeCanvas.height !== h) {
          scopeCanvas.width = w;
          scopeCanvas.height = h;
        }
        scopeCtx.clearRect(0, 0, w, h);
        if (channels === 0 || samples.length === 0) {
          return;
        }
        const frames = Math.floor(samples.length / channels);
        if (frames === 0) {
          return;
        }

        const chHeight = h / channels;
        for (let ch = 0; ch < channels; ch++) {
          const yCenter = chHeight * ch + chHeight / 2;
          const amplitude = chHeight / 2 * 0.85;
          const color = SCOPE_COLORS[ch % SCOPE_COLORS.length];

          scopeCtx.strokeStyle = "rgba(255,255,255,0.06)";
          scopeCtx.lineWidth = 1;
          scopeCtx.beginPath();
          scopeCtx.moveTo(0, yCenter);
          scopeCtx.lineTo(w, yCenter);
          scopeCtx.stroke();

          scopeCtx.strokeStyle = color;
          scopeCtx.lineWidth = 1.5 * dpr;
          scopeCtx.beginPath();
          for (let i = 0; i < w; i++) {
            const frameIdx = Math.floor(i * frames / w);
            const sample = samples[frameIdx * channels + ch];
            const clamped = Math.max(-1, Math.min(1, sample));
            const y = yCenter - clamped * amplitude;
            if (i === 0) {
              scopeCtx.moveTo(i, y);
            } else {
              scopeCtx.lineTo(i, y);
            }
          }
          scopeCtx.stroke();
        }
      }

      function scheduleScopeDraw(channels, samples) {
        latestScopeData = { channels, samples };
        if (pendingScopeFrame !== 0) {
          return;
        }
        pendingScopeFrame = window.requestAnimationFrame(() => {
          pendingScopeFrame = 0;
          drawScope(latestScopeData.channels, latestScopeData.samples);
        });
      }

      function clamp(value, min, max) {
        return Math.min(max, Math.max(min, value));
      }

      function decimalPlaces(step) {
        const text = String(step);
        const dot = text.indexOf(".");
        return dot === -1 ? 0 : text.length - dot - 1;
      }

      function scalarStepForParam(param) {
        if (param.type === "i32" || param.type === "i64") {
          return 1;
        }
        const min = Number(param.rangeMin);
        const max = Number(param.rangeMax);
        if (Number.isFinite(min) && Number.isFinite(max)) {
          const span = Math.abs(max - min);
          if (Number.isFinite(span) && span > 0) {
            const rawStep = Math.max(span / 2000, 0.0001);
            const exponent = Math.floor(Math.log10(rawStep));
            return Math.pow(10, exponent);
          }
        }
        return 0.001;
      }

      function formatNumberForInput(value, step) {
        const numericValue = Number(value);
        if (!Number.isFinite(numericValue)) {
          return "0";
        }
        const places = Math.min(decimalPlaces(step), 8);
        if (places === 0) {
          return String(Math.round(numericValue));
        }
        return numericValue
          .toFixed(places)
          .replace(/\.?0+$/, "");
      }

      function quantizeToStep(value, min, step) {
        if (!Number.isFinite(step) || step <= 0) {
          return value;
        }
        const places = decimalPlaces(step);
        const snapped = min + Math.round((value - min) / step) * step;
        return Number(snapped.toFixed(places));
      }

      function createSliderControl(param, currentValue, step, onInputValue, onCommitValue) {
        const min = Number(param.rangeMin);
        const max = Number(param.rangeMax);
        const slider = document.createElement("div");
        slider.className = "param-slider";
        slider.tabIndex = state.connected ? 0 : -1;
        slider.setAttribute("role", "slider");
        slider.setAttribute("aria-label", param.name);
        slider.setAttribute("aria-valuemin", String(min));
        slider.setAttribute("aria-valuemax", String(max));
        slider.setAttribute("aria-disabled", state.connected ? "false" : "true");

        const track = document.createElement("div");
        track.className = "param-slider-track";
        const fill = document.createElement("div");
        fill.className = "param-slider-fill";
        const thumb = document.createElement("div");
        thumb.className = "param-slider-thumb";
        track.append(fill, thumb);
        slider.appendChild(track);

        let value = clamp(currentValue, min, max);

        const renderValue = () => {
          const ratio = max > min ? (value - min) / (max - min) : 0;
          const pct = clamp(ratio, 0, 1) * 100;
          fill.style.width = pct + "%";
          thumb.style.left = pct + "%";
          slider.setAttribute("aria-valuenow", String(value));
          slider.dataset.value = String(value);
        };

        const setFromClientX = (clientX, commit) => {
          const rect = track.getBoundingClientRect();
          if (rect.width <= 0) {
            return;
          }
          const ratio = clamp((clientX - rect.left) / rect.width, 0, 1);
          const rawValue = min + ratio * (max - min);
          value = quantizeToStep(rawValue, min, Number(step));
          value = clamp(value, min, max);
          renderValue();
          if (commit) {
            onCommitValue(value);
          } else {
            onInputValue(value);
          }
        };

        if (state.connected) {
          slider.addEventListener("pointerdown", (event) => {
            slider.setPointerCapture(event.pointerId);
            setFromClientX(event.clientX, false);

            const onMove = (moveEvent) => {
              if (moveEvent.pointerId !== event.pointerId) {
                return;
              }
              setFromClientX(moveEvent.clientX, false);
            };

            const onEnd = (endEvent) => {
              if (endEvent.pointerId !== event.pointerId) {
                return;
              }
              slider.removeEventListener("pointermove", onMove);
              slider.removeEventListener("pointerup", onEnd);
              slider.removeEventListener("pointercancel", onEnd);
              setFromClientX(endEvent.clientX, true);
              if (slider.hasPointerCapture(event.pointerId)) {
                slider.releasePointerCapture(event.pointerId);
              }
            };

            slider.addEventListener("pointermove", onMove);
            slider.addEventListener("pointerup", onEnd);
            slider.addEventListener("pointercancel", onEnd);
          });

          slider.addEventListener("keydown", (event) => {
            let delta = 0;
            if (event.key === "ArrowLeft" || event.key === "ArrowDown") {
              delta = -Number(step);
            } else if (event.key === "ArrowRight" || event.key === "ArrowUp") {
              delta = Number(step);
            } else if (event.key === "Home") {
              value = min;
            } else if (event.key === "End") {
              value = max;
            } else {
              return;
            }
            event.preventDefault();
            if (delta !== 0) {
              value = clamp(quantizeToStep(value + delta, min, Number(step)), min, max);
            }
            renderValue();
            onCommitValue(value);
          });

          slider.addEventListener("dblclick", (event) => {
            event.preventDefault();
            value = clamp(initialParamValue(param), min, max);
            renderValue();
            onCommitValue(value);
          });
        }

        renderValue();
        return { slider, setValue(nextValue) {
          value = clamp(nextValue, min, max);
          renderValue();
        }};
      }

      function flushPendingParamMessages() {
        pendingParamFrame = 0;
        if (pendingParamMessages.size === 0) {
          return;
        }
        for (const [name, value] of pendingParamMessages.entries()) {
          hostBridge.postMessage({ type: "setParam", name, value, commit: false });
        }
        pendingParamMessages.clear();
      }

      function scheduleParamMessage(name, value) {
        pendingParamMessages.set(name, value);
        if (pendingParamFrame !== 0) {
          return;
        }
        pendingParamFrame = window.requestAnimationFrame(flushPendingParamMessages);
      }

      function commitParamMessage(name, value) {
        pendingParamMessages.delete(name);
        hostBridge.postMessage({ type: "setParam", name, value, commit: true });
      }

      // ---------------------------------------------------------------------------
      // Param hydration
      // ---------------------------------------------------------------------------
      // Ensures every param has `value` filled in from its metadata when the
      // host does not provide it. This is the single code path used by both
      // VS Code and the native window.

      function initialParamValue(param) {
        if (param.type === "bool") {
          if (param.default === null || param.default === undefined) {
            return false;
          }
          return param.default !== 0;
        }
        if (param.default !== null && param.default !== undefined) {
          return param.default;
        }
        if (param.rangeMin !== null && param.rangeMin !== undefined) {
          return param.rangeMin;
        }
        return 0;
      }

      function hydrateParams(params) {
        if (!Array.isArray(params)) return [];
        return params
          .filter(function (p) { return p.scalar !== false; })
          .map(function (p) {
            return Object.assign({}, p, {
              value: (p.value !== undefined && p.value !== null) ? p.value : initialParamValue(p),
            });
          });
      }

      function initialEventArgValue(arg) {
        if (arg.default !== null && arg.default !== undefined) {
          if (arg.type === "bool") {
            return Boolean(arg.default);
          }
          const defaultValue = Number(arg.default);
          return Number.isFinite(defaultValue) ? defaultValue : 0;
        }
        if (arg.type === "bool") {
          if (arg.value !== null && arg.value !== undefined) {
            return arg.value !== 0;
          }
          return false;
        }
        if (arg.value !== null && arg.value !== undefined) {
          const value = Number(arg.value);
          return Number.isFinite(value) ? value : 0;
        }
        return 0;
      }

      function hydrateEvents(events, existingEvents) {
        if (!Array.isArray(events)) return [];
        const previousEvents = Array.isArray(existingEvents) ? existingEvents : [];
        return events.map(function (event) {
          const previous = previousEvents.find(function (item) {
            return item && item.name === event.name;
          });
          const previousArgs = Array.isArray(previous && previous.args) ? previous.args : [];
          return Object.assign({}, event, {
            args: Array.isArray(event.args) ? event.args.map(function (arg, index) {
              const previousArg = previousArgs.find(function (item) {
                return item && item.name === arg.name;
              }) || previousArgs[index];
              const rawValue = arg.value !== undefined && arg.value !== null
                ? arg.value
                : previousArg && previousArg.value !== undefined && previousArg.value !== null
                  ? previousArg.value
                  : undefined;
              const value = rawValue !== undefined && rawValue !== null
                ? rawValue
                : initialEventArgValue(arg);
              return Object.assign({}, arg, {
                value: arg.type === "bool" ? Boolean(value) : (Number.isFinite(Number(value)) ? Number(value) : 0),
              });
            }) : [],
          });
        });
      }

      // ---------------------------------------------------------------------------
      // Message handler
      // ---------------------------------------------------------------------------

      hostBridge.onMessage((message) => {
        if (!message) {
          return;
        }
        if (message.type === "scopeData") {
          scheduleScopeDraw(message.channels, message.samples);
          return;
        }
        if (message.type !== "state") {
          return;
        }
        const incoming = message.state || {};
        // Hydrate params with defaults if the host did not already do so.
        if (incoming.params) {
          incoming.params = hydrateParams(incoming.params);
        }
        if (incoming.events) {
          incoming.events = hydrateEvents(incoming.events, state.events);
        }
        Object.assign(state, incoming);
        render();
      });

      // ---------------------------------------------------------------------------
      // Render
      // ---------------------------------------------------------------------------

      function render() {
        pathNode.textContent = state.path ? state.path : "No patch selected";
        statusNode.textContent = state.connected ? state.status : state.running ? state.status + " (connecting controls...)" : state.status;
        errorNode.textContent = state.error || "";
        errorNode.style.display = state.error ? "block" : "none";
        scopeSection.style.display = state.connected ? "block" : "none";
        const hasBuffers = state.buffers.length > 0;
        const hasEvents = state.events.length > 0;
        const hasParams = state.params.length > 0;
        const hasIoSettings = state.inputDevices.length > 0 || state.outputDevices.length > 0;
        buffersSection.style.display = hasBuffers ? "" : "none";
        eventsSection.style.display = hasEvents ? "" : "none";
        paramsSection.style.display = hasParams ? "" : "none";
        ioSettingsNode.style.display = hasIoSettings ? "grid" : "none";
        buffersSummaryNode.textContent = hasBuffers ? state.buffers.length + " buffer" + (state.buffers.length === 1 ? "" : "s") : "";
        eventsSummaryNode.textContent = hasEvents ? state.events.length + " event" + (state.events.length === 1 ? "" : "s") : "";
        paramsSummaryNode.textContent = hasParams ? state.params.length + " control" + (state.params.length === 1 ? "" : "s") : "";

        startButton.disabled = !state.path || state.running;
        stopButton.disabled = !state.running;
        resetButton.disabled = !hasParams && !hasEvents;
        renderDeviceOptions(inputDeviceNode, state.inputDevices, state.currentInputDevice, true);
        renderDeviceOptions(outputDeviceNode, state.outputDevices, state.currentOutputDevice, true);

        buffersNode.replaceChildren();
        if (hasBuffers) {
          for (const buffer of state.buffers) {
            const card = document.createElement("div");
            card.className = "buffer-card";

            const head = document.createElement("div");
            head.className = "param-head";
            head.innerHTML = '<div class="param-name"></div><div class="param-type"></div>';
            head.querySelector(".param-name").textContent = buffer.name;
            head.querySelector(".param-type").textContent =
              buffer.type + " \u00b7 " + describePatchBufferChannels(buffer);
            card.appendChild(head);

            const loaded = document.createElement("div");
            loaded.className = "buffer-path";
            loaded.textContent = buffer.loadedPath ? buffer.loadedPath : "No file loaded";
            card.appendChild(loaded);

            const actions = document.createElement("div");
            actions.className = "buffer-actions";
            const choose = document.createElement("button");
            choose.className = "secondary";
            choose.textContent = "Choose File";
            choose.addEventListener("click", () => {
              hostBridge.postMessage({ type: "chooseBufferFile", name: buffer.name });
            });
            const clear = document.createElement("button");
            clear.className = "secondary";
            clear.textContent = "Clear";
            clear.disabled = !buffer.loadedPath;
            clear.addEventListener("click", () => {
              hostBridge.postMessage({ type: "clearBuffer", name: buffer.name });
            });
            actions.append(choose, clear);
            card.appendChild(actions);

            buffersNode.appendChild(card);
          }
        }

        eventsNode.replaceChildren();
        if (hasEvents) {
          for (const event of state.events) {
            const card = document.createElement("div");
            card.className = "param";

            const head = document.createElement("div");
            head.className = "param-head";
            head.innerHTML = '<div class="param-name"></div><div class="param-type"></div>';
            head.querySelector(".param-name").textContent = event.name;
            head.querySelector(".param-type").textContent = Array.isArray(event.args) && event.args.length > 0
              ? event.args.map((arg) => arg.name + ": " + arg.type).join(", ")
              : "no args";
            card.appendChild(head);

            const controls = document.createElement("div");
            controls.className = "param-controls";
            card.appendChild(controls);

            for (const arg of event.args || []) {
              const setting = document.createElement("div");
              setting.className = "param-setting";

              const label = document.createElement("div");
              label.className = "param-setting-label";
              label.textContent = arg.name;
              setting.appendChild(label);

              if (arg.type === "bool") {
                const toggle = document.createElement("label");
                toggle.className = "param-toggle";
                const input = document.createElement("input");
                input.type = "checkbox";
                input.checked = Boolean(arg.value);
                input.disabled = !state.connected;
                const text = document.createElement("span");
                text.textContent = input.checked ? "On" : "Off";
                input.addEventListener("change", () => {
                  arg.value = input.checked;
                  text.textContent = input.checked ? "On" : "Off";
                });
                toggle.append(input, text);
                setting.appendChild(toggle);
              } else {
                const number = document.createElement("input");
                number.className = "param-number";
                number.type = "number";
                number.step = arg.type === "i32" || arg.type === "i64" ? "1" : "0.001";
                number.value = String(typeof arg.value === "number" ? arg.value : 0);
                number.disabled = !state.connected;
                number.addEventListener("input", () => {
                  const nextValue = Number(number.value);
                  if (Number.isFinite(nextValue)) {
                    arg.value = nextValue;
                  }
                });
                number.addEventListener("change", () => {
                  const nextValue = Number(number.value);
                  arg.value = Number.isFinite(nextValue) ? nextValue : 0;
                  number.value = String(arg.value);
                });
                setting.appendChild(number);
              }

              controls.appendChild(setting);
            }

            const actions = document.createElement("div");
            actions.className = "event-actions";
            const trigger = document.createElement("button");
            trigger.className = "event-trigger";
            trigger.textContent = "Trigger";
            trigger.disabled = !state.connected;
            trigger.addEventListener("click", () => {
              hostBridge.postMessage({
                type: "triggerEvent",
                name: event.name,
                values: (event.args || []).map((arg) => arg.type === "bool" ? Boolean(arg.value) : Number(arg.value)),
              });
            });
            actions.appendChild(trigger);
            card.appendChild(actions);

            eventsNode.appendChild(card);
          }
        }

        paramsNode.replaceChildren();
        for (const param of state.params) {
          const card = document.createElement("div");
          card.className = "param";

          const head = document.createElement("div");
          head.className = "param-head";
          head.innerHTML = '<div class="param-name"></div><div class="param-type"></div>';
          head.querySelector(".param-name").textContent = param.name;
          head.querySelector(".param-type").textContent = param.type;
          card.appendChild(head);

          const controls = document.createElement("div");
          controls.className = "param-controls";
          card.appendChild(controls);

          if (param.type === "bool") {
            const label = document.createElement("label");
            label.className = "param-toggle";
            const input = document.createElement("input");
            input.type = "checkbox";
            input.checked = Boolean(param.value);
            input.disabled = !state.connected;
            input.addEventListener("change", () => {
              hostBridge.postMessage({ type: "setParam", name: param.name, value: input.checked });
            });
            const text = document.createElement("span");
            text.textContent = input.checked ? "On" : "Off";
            input.addEventListener("change", () => {
              text.textContent = input.checked ? "On" : "Off";
            });
            label.append(input, text);
            controls.appendChild(label);
          } else {
            const hasRange = Number.isFinite(param.rangeMin) && Number.isFinite(param.rangeMax);
            const stepValue = scalarStepForParam(param);
            const step = String(stepValue);
            const currentValue = typeof param.value === "number" ? param.value : 0;

            if (hasRange) {
              const number = document.createElement("input");
              number.className = "param-number";
              number.type = "number";
              number.min = String(param.rangeMin);
              number.max = String(param.rangeMax);
              number.step = step;
              number.value = formatNumberForInput(currentValue, stepValue);
              number.disabled = !state.connected;
              controls.appendChild(number);

              const sliderControl = createSliderControl(
                param,
                currentValue,
                step,
                (nextValue) => {
                  const nextText = formatNumberForInput(nextValue, stepValue);
                  number.value = nextText;
                  scheduleParamMessage(param.name, nextValue);
                },
                (nextValue) => {
                  const nextText = formatNumberForInput(nextValue, stepValue);
                  number.value = nextText;
                  commitParamMessage(param.name, nextValue);
                },
              );
              controls.prepend(sliderControl.slider);

              const sync = (nextValue) => {
                const parsed = Number(nextValue);
                if (!Number.isFinite(parsed)) {
                  return;
                }
                const quantized = clamp(
                  quantizeToStep(parsed, Number(param.rangeMin), stepValue),
                  Number(param.rangeMin),
                  Number(param.rangeMax),
                );
                sliderControl.setValue(quantized);
                number.value = formatNumberForInput(quantized, stepValue);
              };

              number.addEventListener("change", () => {
                sync(number.value);
                commitParamMessage(param.name, Number(number.value));
              });
            } else {
              const number = document.createElement("input");
              number.className = "param-number";
              number.type = "number";
              number.step = step;
              number.value = formatNumberForInput(currentValue, stepValue);
              number.disabled = !state.connected;
              number.addEventListener("change", () => {
                const parsed = Number(number.value);
                if (!Number.isFinite(parsed)) {
                  return;
                }
                const quantized = quantizeToStep(parsed, 0, stepValue);
                number.value = formatNumberForInput(quantized, stepValue);
                hostBridge.postMessage({ type: "setParam", name: param.name, value: quantized });
              });
              controls.appendChild(number);
            }

          }

          paramsNode.appendChild(card);
        }
      }

      // ---------------------------------------------------------------------------
      // Helpers
      // ---------------------------------------------------------------------------

      function describePatchBufferChannels(buffer) {
        switch (buffer.channelsKind) {
          case "mono":
            return "mono";
          case "static":
            return String(buffer.channelsStatic || 0) + "-channel";
          case "dynamic":
            return "dynamic channels";
          default:
            return "unknown";
        }
      }

      function renderDeviceOptions(node, devices, selected, enabled) {
        if (!node) {
          return;
        }
        node.replaceChildren();
        const defaultOption = document.createElement("option");
        defaultOption.value = "";
        defaultOption.textContent = "Default";
        node.appendChild(defaultOption);
        for (const device of devices || []) {
          const option = document.createElement("option");
          option.value = device;
          option.textContent = device;
          node.appendChild(option);
        }
        node.value = selected || "";
        node.disabled = !enabled;
      }

      render();
    </script>
  </body>
</html>
